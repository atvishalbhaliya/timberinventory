services:
  nginx:
    image: nginx:1.27-alpine
    container_name: suresh_timber_nginx
    ports:
      - "8080:80"
    volumes:
      - ../:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm

  php-fpm:
    build:
      context: ./php
    container_name: suresh_timber_php
    working_dir: /var/www/html
    volumes:
      - ../:/var/www/html
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.4
    container_name: suresh_timber_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: suresh_timber_erp
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf

  redis:
    image: redis:7-alpine
    container_name: suresh_timber_redis
    ports:
      - "6379:6379"

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: suresh_timber_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      - mysql

volumes:
  mysql_data:
